name: SET Stock Alert
on:
  schedule:
    - cron: "30 1 * * 1-5"   # 09:30 น. — ก่อนตลาดเปิด (เตรียมตัว)
    - cron: "30 6 * * 1-5"   # 13:30 น. — ช่วงบ่าย (ระหว่างวัน)
    - cron: "10 10 * * 1-5"  # 17:10 น. — หลังปิดตลาด (รอบหลัก)
  workflow_dispatch:   # รันด้วยมือได้จาก Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas yfinance requests gspread google-auth

      - name: Run SET Alert
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SPREADSHEET_ID:      ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python set_alert_final.py
